# Deploy Streem landing page to GitHub Pages
# Triggers on push to main when landing app or packages change.
# Uses OIDC-authenticated GitHub Pages Actions (not the deprecated gh-pages npm approach).
# Source: https://vite.dev/guide/static-deploy#github-pages

name: Deploy Landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - 'packages/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

# Required permissions for OIDC-based Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; cancel in-progress if new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @streeem/core --filter @streeem/dom --filter @streeem/streams --filter @streeem/lit --filter streeem build

      - name: Build landing page
        run: pnpm --filter @streeem/landing build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Must match Vite build.outDir (default: dist) relative to apps/landing/
          path: apps/landing/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
